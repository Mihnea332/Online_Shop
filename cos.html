<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Coșul Meu</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff0f5;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #000;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .titlu {
      font-family: 'Pacifico', cursive;
      font-size: 40px;
      color: #ff69b4;
    }
    .link-titlu {
      color: inherit;
      text-decoration: none;
    }
    .link-titlu:hover {
      text-decoration: underline;
    }
    h2 {
      text-align: left;
      padding-left: 20px;
    }
    .continut {
      padding: 20px;
      text-align: left;
    }
    .produs-cos {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0 10px 20px;
      width: 300px;
      background-color: white;
      text-align: left;
    }
    .buton {
      background-color: #dc3545;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
      margin-top: 10px;
    }
    .buton:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="titlu"><a href="index.html" class="link-titlu">Handmade Mom</a></h1>
    <h2>Coșul Meu (<span id="numar-cos">0</span> produse)</h2>
  </header>

  <div class="continut">
    <h2>Produsele adăugate:</h2>
    <div id="lista-cos"></div>
    <button id="goleste-cos" class="buton">Golește coșul</button>
  </div>

  <script>
    let produse = JSON.parse(localStorage.getItem("cosProduse")) || [];

    function actualizeazaCos() {
      const listaCos = document.getElementById("lista-cos");
      listaCos.innerHTML = "";

      if (produse.length === 0) {
        listaCos.innerHTML = "<p>Momentan nu ai produse în coș.</p>";
        return;
      }

      produse.forEach((produs, index) => {
        const divProdus = document.createElement("div");
        divProdus.className = "produs-cos";
        divProdus.innerHTML = `
          <p><strong>${produs.cantitate}x</strong></p>
          <h3>${produs.nume}</h3>
          <p>Preț: ${produs.pret} RON</p>
          <button class="buton" onclick="scadeCantitate(${index})">-</button>
          <button class="buton" onclick="stergeProdus(${index})">Șterge</button>
          <button class="buton" onclick="cresteCantitate(${index})">+</button>
        `;
        listaCos.appendChild(divProdus);
      });

      const total = produse.reduce((suma, produs) => suma + produs.pret * produs.cantitate, 0);
      const totalDiv = document.createElement("div");
      totalDiv.style.marginTop = "30px";
      totalDiv.innerHTML = `<h3>Total de plată: <strong>${total} RON</strong></h3>`;
      listaCos.appendChild(totalDiv);

      document.getElementById("numar-cos").textContent = produse.reduce((total, p) => total + p.cantitate, 0);
    }

    function stergeProdus(index) {
      produse.splice(index, 1);
      localStorage.setItem("cosProduse", JSON.stringify(produse));
      location.reload();
    }

    function scadeCantitate(index) {
      if (produse[index].cantitate > 1) {
        produse[index].cantitate -= 1;
      } else {
        produse.splice(index, 1);
      }
      localStorage.setItem("cosProduse", JSON.stringify(produse));
      location.reload();
    }
function cresteCantitate(index) {
      if (produse[index].cantitate > 1) {
        produse[index].cantitate += 1;
      } else {
        produse.splice(index, 1);
      }
      localStorage.setItem("cosProduse", JSON.stringify(produse));
      location.reload();
    }
    document.addEventListener("DOMContentLoaded", () => {
      actualizeazaCos();

      const golesteCos = document.getElementById("goleste-cos");
      golesteCos.addEventListener("click", () => {
        localStorage.removeItem("cosProduse");
        location.reload();
      });
    });
  </script>
</body>
</html>
