<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Tavi - Handmade Mom</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff0f5;
      margin: 0;
      padding: 0;
    }
    header {
      height: 400px;
      overflow: hidden;
    }
    .imagine-header {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      margin-bottom: 0;
    }
    .meniu {
      display: flex;
      justify-content: center;
      background-color: #ffb6c1;
      padding: 10px 20px;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 0;
    }
    .meniu a {
      text-decoration: none;
      color: #000;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 5px;
      background-color: white;
      transition: background-color 0.3s;
    }
    .meniu a:hover {
      background-color: #ffe4e1;
    }
    .continut {
      padding: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .produs {
      background-color: white;
      border: 2px solid #ff69b4;
      border-radius: 8px;
      padding: 15px;
      width: 250px;
      text-align: center;
    }
    .buton {
      background-color: #ff69b4;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    .buton:hover {
      background-color: #ff85c1;
    }
    .slider {
  position: relative;
  width: 100%;
  max-width: 900px;   /* lățimea maximă a boxului */
  height: 500px;      /* înălțimea fixă a boxului */
  margin: 30px auto;
  overflow: hidden;
  border-radius: 10px;
  background-color: #fff; /* fundal alb dacă imaginea nu acoperă tot */
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;  /* taie frumos imaginea ca să umple boxul */
  display: block;
}
.next {
  position: absolute;
  top: 50%;
  right: 10px; /* mutăm în dreapta */
  transform: translateY(-50%);
  background-color: rgba(255, 105, 180, 0.8);
  color: white;
  border: none;
  font-size: 30px;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}
.next:hover {
  background-color: rgba(255, 105, 180, 1);
}
.prev {
  position: absolute;
  top: 50%;
  left: 10px; /* mutăm în dreapta */
  transform: translateY(-50%);
  background-color: rgba(255, 105, 180, 0.8);
  color: white;
  border: none;
  font-size: 30px;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 5px;
}
  </style>
</head>
<body>
  <header>
    <a href="index.html">
      <img src="resources/logo.jpg" alt="Handmade Mom" class="imagine-header">
    </a>
  </header>

  <nav class="meniu">
    <a href="seturi_mot.html">SETURI DE MOT</a>
    <a href="marturii.html">MARTURII BOTEZ</a>
    <a href="pahare.html">PAHARE PERSONALIZATE</a>
    <a href="seturi_cadou.html">SETURI CADOU</a>
    <a href="tricouri.html">TRICOURI PERSONALIZATE</a>
    <a href="invitatii.html">INVITATII</a>
    <a href="trusouri.html">TRUSOURI BOTEZ</a>
    <a href="contact.html">CONTACT</a>
    <a href="livrare.html">INFO LIVRARE 🚚</a>
  </nav>
<div class="slider">
  <button class="prev">&#10094;</button>
  <img id="slide" src="Resources/Seturi de mot/set_mot0.jpg" alt="Imagine slider">
  <button class="next">&#10095;</button>
</div>
<script src="script.js"></script>
  
 
</body>
</html>
