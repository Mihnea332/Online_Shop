<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Magazin Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffc0cb;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #ff69b4;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .titlu {
      font-family: 'Pacifico', cursive;
      font-size: 50px;
      color: #530c30;
    }
    .link-titlu {
      color: inherit;
      text-decoration: none;
    }
    .link-titlu:hover {
      text-decoration: underline;
    }
.buton-cos {
  display: inline-block;
  background-color: #ff69b4;
  color: white;
  padding: 10px 15px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
  position: absolute;   /* îl scoatem din flux */
  top: 20px;            /* distanță față de partea de sus a header-ului */
  right: 20px;          /* distanță față de marginea dreaptă */
}
.buton-cos:hover {
  background-color: #ff85c1;
}
    .produse {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .produs {
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin: 10px;
      padding: 15px;
      width: 200px;
      text-align: center;
    }
    .produs img {
      width: 100%;
      height: auto;
    }
    .buton {
      background-color: #28a745;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .meniu {
  display: flex;
  justify-content: center;
  background-color: #ff69b4;
  padding: 10px 20px;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.meniu a {
  text-decoration: none;
  color: #000;
  font-weight: bold;
  padding: 8px 12px;
  border-radius: 5px;
  background-color: white;
  transition: background-color 0.3s;
}

.meniu a:hover {
  background-color: #ffe4e1;
}
  </style>
</head>
<body>
 <header>
  <h1 class="titlu"><a href="index.html" class="link-titlu">Handmade Mom</a></h1>
  <p>Produse în coș: <span id="numar-cos">0</span></p>
  <a href="cos.html" class="buton-cos">Vezi coșul</a>

  <!-- Bara de navigație sub titlu și contor -->
  <nav class="meniu">
    <a href="tavite.html">TAVITE DE MOT</a>
    <a href="tricouri.html">TRICOURI</a>
    <a href="seturi.html">SETURI</a>
    <a href="trusouri.html">TRUSOURI BOTEZ</a>
    <a href="lumanari.html">LUMANARI</a>
    <a href="cani.html">CANI PERSONALIZATE</a>
    <a href="contact.html">CONTACT</a>
    
  </nav>
</header>

  <div class="produse">
    <div class="produs">
      <img src="https://via.placeholder.com/200" alt="Produs 1">
      <h3>Tricou Personalizat</h3>
      <p>Preț: 49 RON</p>
      <button class="buton" onclick="adaugaInCos('Tricou Personalizat', 49)">Adaugă în coș</button>
    </div>
    <div class="produs">
      <img src="https://via.placeholder.com/200" alt="Produs 2">
      <h3>Cană cu poză</h3>
      <p>Preț: 35 RON</p>
      <button class="buton" onclick="adaugaInCos('Cană cu poză', 35)">Adaugă în coș</button>
    </div>
  </div>
</body>
</html>
