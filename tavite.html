<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Tavi - Handmade Mom</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff0f5;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #000;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .titlu {
      font-family: 'Pacifico', cursive;
      font-size: 40px;
      color: #ff69b4;
    }
    .link-titlu {
      color: inherit;
      text-decoration: none;
    }
    .link-titlu:hover {
      text-decoration: underline;
    }
    .continut {
      padding: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .produs {
      background-color: white;
      border: 2px solid #ff69b4;
      border-radius: 8px;
      padding: 15px;
      width: 250px;
      text-align: center;
    }
    .buton {
      background-color: #ff69b4;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    .buton:hover {
      background-color: #ff85c1;
    }
    .buton-cos {
  display: inline-block;
  background-color: #ff69b4;
  color: white;
  padding: 10px 15px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
  position: absolute;   /* îl scoatem din flux */
  top: 20px;            /* distanță față de partea de sus a header-ului */
  right: 20px;          /* distanță față de marginea dreaptă */
}
.buton-cos:hover {
  background-color: #ff85c1;
}
  </style>
</head>
<body>
  <header>
    <a href="cos.html" class="buton-cos">Vezi coșul</a>
    <h1 class="titlu"><a href="index.html" class="link-titlu">Handmade Mom</a></h1>
    <h2>TAVITE</h2>
  </header>
 <p>Produse în coș: <span id="numar-cos">0</span></p>
  <div class="continut">
    <div class="produs">
      <h3>Tavă rotundă</h3>
      <p>Preț: 35 RON</p>
      <button class="buton" onclick="adaugaInCos('Tavă rotundă', 35)">Adaugă în coș</button>
    </div>
    <div class="produs">
      <h3>Tavă pătrată</h3>
      <p>Preț: 40 RON</p>
      <button class="buton" onclick="adaugaInCos('Tavă pătrată', 40)">Adaugă în coș</button>
    </div>
    <div class="produs">
      <h3>Tavă cu mâner</h3>
      <p>Preț: 45 RON</p>
      <button class="buton" onclick="adaugaInCos('Tavă cu mâner', 45)">Adaugă în coș</button>
    </div>
  </div>

  <script>
    function adaugaInCos(nume, pret) {
      let cos = JSON.parse(localStorage.getItem("cosProduse")) || [];
      let existent = cos.find(p => p.nume === nume);
      if (existent) {
        existent.cantitate += 1;
      } else {
        cos.push({ nume: nume, pret: pret, cantitate: 1 });
      }
      localStorage.setItem("cosProduse", JSON.stringify(cos));
      
    }
  </script>
</body>
</html>
