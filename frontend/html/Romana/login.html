<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Atelierul Meu</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Arial:wght@400;700&display=swap"
      rel="stylesheet" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #fff0f5;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .header-login {
        background-color: #ffb6c1;
        padding: 40px;
        text-align: center;
      }

      .font-pacifico {
        font-family: "Pacifico", cursive;
        color: #333;
      }

      .content {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .formular-login {
        width: 100%;
        max-width: 400px;
        background-color: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
        text-align: center;
      }

      .formular-login h2 {
        margin-bottom: 30px;
        font-size: 2rem;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }

      .formular-login input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ffb6c1;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
      }

      .btn-login {
        width: 100%;
        background-color: #ff69b4;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 10px;
      }

      .btn-login:hover {
        background-color: #ff1493;
      }

      .error-message {
        color: #d9534f;
        background: #f2dede;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none; /* Ascuns implicit */
      }

      footer {
        background-color: #333;
        color: white;
        padding: 20px;
        text-align: center;
        margin-top: auto;
      }
    </style>
  </head>
  <body>
    <header class="header-login">
      <h1 class="font-pacifico">Atelierul Meu</h1>
    </header>

    <div class="content">
      <div class="formular-login">
        <h2 class="font-pacifico">Login Admin</h2>

        <div id="error-box" class="error-message">
          Date de logare incorecte!
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Admin:</label>
            <input
              type="email"
              id="email"
              placeholder="admin@exemplu.ro"
              required />
          </div>

          <div class="form-group">
            <label for="password">Parolă:</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required />
          </div>

          <button type="submit" class="btn-login">Accesează Panoul</button>
        </form>

        <p style="margin-top: 20px">
          <a href="index.html" style="color: #ff69b4; text-decoration: none"
            >← Înapoi la magazin</a
          >
        </p>
      </div>
    </div>

    <footer>
      <p class="footer-copy">&copy; 2026 Atelierul Meu Admin Panel</p>
    </footer>

    <script>
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const errorBox = document.getElementById("error-box");

          try {
            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              // Trimitem datele sub formă de JSON
              body: JSON.stringify({ email, password }),
            });

            const data = await response.json();

            if (response.ok) {
              // 1. Salvăm Token-ul JWT în localStorage (foarte important!)
              localStorage.setItem("adminToken", data.token);

              // 2. Opțional: salvăm și numele adminului pentru a-l saluta în panou
              localStorage.setItem("adminName", data.user.username);

              // 3. Redirecționăm către panou
              window.location.href = "panou.html";
            } else {
              // Dacă serverul a returnat 401 (parolă greșită), afișăm mesajul din controller
              errorBox.textContent = data.message;
              errorBox.style.display = "block";
            }
          } catch (error) {
            console.error("Eroare la conectare:", error);
            errorBox.textContent =
              "Serverul nu răspunde. Verifică dacă backend-ul este pornit!";
            errorBox.style.display = "block";
          }
        });
    </script>
  </body>
</html>
